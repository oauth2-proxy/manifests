name: oauth2-proxy
version: 10.5.0
apiVersion: v2
appVersion: 7.15.2
home: https://oauth2-proxy.github.io/oauth2-proxy/
description: A reverse proxy that provides authentication with Google, Github or other providers
keywords:
  - kubernetes
  - oauth
  - oauth2
  - authentication
  - google
  - github
  - redis
dependencies:
  - name: redis-ha
    version: 4.35.10
    repository: https://dandydeveloper.github.io/charts
    condition: redis-ha.enabled
sources:
  - https://github.com/oauth2-proxy/oauth2-proxy
  - https://github.com/oauth2-proxy/manifests
maintainers:
  - name: pierluigilenoci
    email: pierluigi.lenoci@gmail.com
  - name: tuunit
    email: jan@larwig.com
  - name: JoelSpeed
    email: joel.speed@hotmail.co.uk
kubeVersion: ">=1.16.0-0"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: >
        Add deploymentLabels to allow setting deployment specific labels.
        Add tpl support for ingress.labels, ingress.extraPaths and nodeSelector. This is a
        behavior change: any values containing `{{ ... }}` will now be evaluated as templates.
        To keep literal `{{` sequences, escape them (for example, use `{{"{{"}}`).
      links:
        - name: GitHub PR
          url: https://github.com/oauth2-proxy/manifests/pull/400
