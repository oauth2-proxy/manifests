# Test: tpl support for sessionStorage.redis.existingSecret
# Verifies that:
# 1. A plain string value works unchanged (tpl is a no-op)
# 2. The secret referenced by existingSecret is correctly mounted
# The secret is provisioned inline via extraObjects so the install test passes.
# The Helm template expression path (e.g. '{{ .Release.Name }}-redis-secret')
# is exercised by ct lint (helm template evaluates tpl()).
sessionStorage:
  type: redis
  redis:
    clientType: standalone
    existingSecret: "redis-test-secret"
    passwordKey: redis-password
    standalone:
      connectionUrl: "redis://redis:6379"

extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: redis-test-secret
    type: Opaque
    stringData:
      redis-password: "testpassword"
